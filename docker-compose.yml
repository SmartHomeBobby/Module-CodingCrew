services:
  local-coding-crew:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local_coding_crew
    restart: "no" # CrewAI tasks run until completion normally
    environment:
      - PYTHONUNBUFFERED=1
      - TECHNICAL_DETAILS=${TECHNICAL_DETAILS:-}
    # Volumes are mapped so generated code is persisted outside the container
    volumes:
      - ./generated_projects:/app/generated_projects

  # Version 2 
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-unraid
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - /mnt/user/appdata/ollama:/root/.ollama
      - /mnt/cache/ollama-models:/models  # SSD-Cache für Speed
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_NUM_PARALLEL=2  # 2 parallele Anfragen
    # CPU-Optimierung
    deploy:
      resources:
        limits:
          memory: 64G  # Deine verfügbare RAM
        reservations:
          memory: 16G

  # OpenWebUI für einfache Modell-Verwaltung (optional)
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports: ["3000:8080"]
    volumes: [/mnt/user/appdata/webui:/app/backend/data]
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on: [ollama]

    
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    ports: ["8911:8080"]
    volumes: ["/mnt/user/appdata/webui:/app/backend/data"]
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on: [ollama]