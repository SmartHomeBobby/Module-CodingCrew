services:
  local-coding-crew:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local_coding_crew
    restart: "no"
    environment:
      - PYTHONUNBUFFERED=1
      - TECHNICAL_DETAILS=${TECHNICAL_DETAILS:-}
    volumes:
      - ./generated_projects:/app/generated_projects
    networks:
      - webui-net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-unraid
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - /mnt/user/appdata/ollama:/root/.ollama
      - /mnt/cache/ollama-models:/models
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_NUM_PARALLEL=2
    networks:
      - webui-net

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: webui-unraid
    ports: ["8911:8080"]
    volumes: ["/mnt/user/appdata/webui:/app/backend/data"]
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      # SearxNG Integration
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=
      - RAG_WEB_SEARCH_RESULT_COUNT=5
    depends_on: 
      - ollama
      - searxng
    networks:
      - webui-net

  searxng:
    image: searxng/searxng:latest
    container_name: searxng-unraid
    ports:
      - "8381:8080"
    volumes:
      - /mnt/user/appdata/searxng:/etc/searxng:rw
      - searxng-cache:/var/cache/searxng:rw
    environment:
      - TZ=Europe/Berlin
      - SEARXNG_BIND_ADDRESS=0.0.0.0
      - PUID=99  # Unraid nobody
      - PGID=100 # Unraid users
    user: "977:977"  # SearxNG user
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped
    networks:
      - webui-net

volumes:
  searxng-cache:

networks:
  webui-net:
    driver: bridge
